<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 220" role="img"
     aria-label="agentfootprint — the 4 control flows: Sequence (linear chain A → B → C), Parallel (fan-out then fan-in across multiple agents), Decide (diamond gate that routes on a rule), Loop (cycle back from end to start until convergence). All four shown in one yellow visual language; differentiation is by SHAPE not color, signaling that 'control flow' is one category with four iconic forms.">

  <defs>
    <style>
      .pulse  { animation: cf-p 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      .pulse2 { animation: cf-p 2.4s ease-in-out infinite; animation-delay: 0.3s; transform-origin: center; transform-box: fill-box; }
      .pulse3 { animation: cf-p 2.4s ease-in-out infinite; animation-delay: 0.6s; transform-origin: center; transform-box: fill-box; }
      .pulse4 { animation: cf-p 2.4s ease-in-out infinite; animation-delay: 0.9s; transform-origin: center; transform-box: fill-box; }
      @keyframes cf-p { 0%,100% { opacity: 1 } 50% { opacity: 0.65 } }

      .head { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; font-size: 13px; letter-spacing: 0.20em; font-weight: 800; fill: #6B7280; }
      .name { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 800; fill: #FCD34D; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; font-size: 11px; fill: #9CA3AF; }
    </style>
  </defs>

  <!-- micro-headline -->
  <text x="700" y="30" text-anchor="middle" class="head">THE 4 CONTROL FLOWS</text>

  <!-- ════════ Card 1: Sequence ════════ -->
  <g class="pulse" transform="translate(30,55)">
    <rect width="320" height="140" rx="14" fill="rgba(252,211,77,0.05)" stroke="rgba(252,211,77,0.32)" stroke-width="0.8"/>
    <g transform="translate(76,52)">
      <circle cx="0" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="6" y1="0" x2="32" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <polygon points="30,-3 36,0 30,3" fill="#FCD34D"/>
      <circle cx="44" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="50" y1="0" x2="76" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <polygon points="74,-3 80,0 74,3" fill="#FCD34D"/>
      <circle cx="88" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="94" y1="0" x2="120" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <polygon points="118,-3 124,0 118,3" fill="#FCD34D"/>
      <circle cx="132" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">SEQUENCE</text>
    <text x="160" y="120" text-anchor="middle" class="desc">linear chain · A → B → C</text>
  </g>

  <!-- ════════ Card 2: Parallel ════════ -->
  <g class="pulse2" transform="translate(370,55)">
    <rect width="320" height="140" rx="14" fill="rgba(252,211,77,0.05)" stroke="rgba(252,211,77,0.32)" stroke-width="0.8"/>
    <g transform="translate(108,52)">
      <circle cx="0" cy="0" r="5" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="40" y2="-18" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="40" y2="0"   stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="40" y2="18"  stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="46" cy="-18" r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="46" cy="0"   r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="46" cy="18"  r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="50" y1="-18" x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="50" y1="0"   x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="50" y1="18"  x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="92" cy="0" r="5" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">PARALLEL</text>
    <text x="160" y="120" text-anchor="middle" class="desc">fan-out + fan-in · race / vote</text>
  </g>

  <!-- ════════ Card 3: Decide ════════ -->
  <g class="pulse3" transform="translate(710,55)">
    <rect width="320" height="140" rx="14" fill="rgba(252,211,77,0.05)" stroke="rgba(252,211,77,0.32)" stroke-width="0.8"/>
    <g transform="translate(106,52)">
      <circle cx="0" cy="0" r="5" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="22" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <polygon points="40,-14 60,0 40,14 20,0" fill="rgba(252,211,77,0.10)" stroke="#FCD34D" stroke-width="1.6" stroke-linejoin="round"/>
      <line x1="60" y1="-2" x2="78" y2="-18" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="60" y1="0"  x2="78" y2="0"   stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="60" y1="2"  x2="78" y2="18"  stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="84" cy="-18" r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="84" cy="0"   r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="84" cy="18"  r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">DECIDE</text>
    <text x="160" y="120" text-anchor="middle" class="desc">diamond branch · route on rule</text>
  </g>

  <!-- ════════ Card 4: Loop ════════ -->
  <g class="pulse4" transform="translate(1050,55)">
    <rect width="320" height="140" rx="14" fill="rgba(252,211,77,0.05)" stroke="rgba(252,211,77,0.32)" stroke-width="0.8"/>
    <g transform="translate(110,42)">
      <!-- A → B with loop back -->
      <circle cx="0" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="6" y1="0" x2="46" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <polygon points="44,-3 50,0 44,3" fill="#FCD34D"/>
      <circle cx="58" cy="0" r="6" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <!-- loop arc back from B (58,6) over to A (0,6) -->
      <path d="M 58 8 C 58 32, 0 32, 0 8" stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="2,10 -3,5 -3,15" fill="#FCD34D"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">LOOP</text>
    <text x="160" y="120" text-anchor="middle" class="desc">cycle back · iterate / converge</text>
  </g>

</svg>
