<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>agentfootprint — hero preview (light + dark)</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .pane { padding: 40px 5%; }
    .light { background: #ffffff; color: #2A121B; }
    .dark  { background: #0d1117; color: #E5E7EB; }
    h2 { margin: 0 0 16px; font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; }
    img { display: block; width: 100%; max-width: 1400px; }
  </style>
</head>
<body>
  <section class="pane light">
    <h2>Light theme — what GitHub readers on default theme see</h2>
    <img src="hero-light.svg" alt="agentfootprint hero (light)">
  </section>
  <section class="pane dark">
    <h2>Dark theme — what GitHub readers on dark theme see</h2>
    <img src="hero-dark.svg" alt="agentfootprint hero (dark)">
  </section>
</body>
</html>
