<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>agentfootprint — hero previews</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .pane { padding: 40px 5%; }
    .light { background: #ffffff; color: #2A121B; }
    .dark  { background: #0d1117; color: #E5E7EB; }
    h2 { margin: 0 0 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5; }
    h3 { margin: 36px 0 12px; font-size: 14px; font-weight: 600; opacity: 0.7; }
    img { display: block; width: 100%; max-width: 1400px; }
  </style>
</head>
<body>
  <section class="pane light">
    <h2>Light theme</h2>
    <h3>#1 — context flavors → mascot → LLM slots</h3>
    <img src="hero-light.svg" alt="agentfootprint hero (light)">
    <h3>#2 — flavors → injection primitive → LLM slots</h3>
    <img src="injection-light.svg" alt="injection primitive (light)">
    <h3>#3 — Classic vs Dynamic ReAct loop topology</h3>
    <img src="dynamic-vs-classic-light.svg" alt="classic vs dynamic ReAct (light)">
  </section>
  <section class="pane dark">
    <h2>Dark theme</h2>
    <h3>#1 — context flavors → mascot → LLM slots</h3>
    <img src="hero-dark.svg" alt="agentfootprint hero (dark)">
    <h3>#2 — flavors → injection primitive → LLM slots</h3>
    <img src="injection-dark.svg" alt="injection primitive (dark)">
    <h3>#3 — Classic vs Dynamic ReAct loop topology</h3>
    <img src="dynamic-vs-classic-dark.svg" alt="classic vs dynamic ReAct (dark)">
  </section>
</body>
</html>
