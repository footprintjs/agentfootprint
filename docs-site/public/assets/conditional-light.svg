<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" role="img"
     aria-label="Conditional control flow — diamond gate routes to one of three branches based on a predicate.">
  <defs>
    <style>
      .pulse  { animation: cf-p 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes cf-p { 0%,100% { opacity: 1 } 50% { opacity: 0.65 } }
      .name { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 800; fill: #B45309; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; font-size: 11px; fill: #6B7280; }
    </style>
  </defs>
  <g class="pulse" transform="translate(20,0)">
    <rect width="320" height="140" rx="14" fill="rgba(180,83,9,0.05)" stroke="rgba(180,83,9,0.32)" stroke-width="0.8"/>
    <g transform="translate(106,52)">
      <circle cx="0" cy="0" r="5" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="22" y2="0" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <polygon points="40,-14 60,0 40,14 20,0" fill="rgba(180,83,9,0.10)" stroke="#B45309" stroke-width="1.6" stroke-linejoin="round"/>
      <line x1="60" y1="-2" x2="78" y2="-18" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <line x1="60" y1="0"  x2="78" y2="0"   stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <line x1="60" y1="2"  x2="78" y2="18"  stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <circle cx="84" cy="-18" r="4" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <circle cx="84" cy="0"   r="4" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <circle cx="84" cy="18"  r="4" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">CONDITIONAL</text>
    <text x="160" y="120" text-anchor="middle" class="desc">diamond branch · when / otherwise</text>
  </g>
</svg>
