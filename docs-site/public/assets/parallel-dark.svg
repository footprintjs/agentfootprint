<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" role="img"
     aria-label="Parallel control flow — fan-out and fan-in pattern; one input agent fans to 3 parallel agents and merges back to one output agent. All edges in yellow.">
  <defs>
    <style>
      .pulse  { animation: cf-p 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes cf-p { 0%,100% { opacity: 1 } 50% { opacity: 0.65 } }
      .name { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 800; fill: #FCD34D; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; font-size: 11px; fill: #9CA3AF; }
    </style>
  </defs>
  <g class="pulse" transform="translate(20,0)">
    <rect width="320" height="140" rx="14" fill="rgba(252,211,77,0.05)" stroke="rgba(252,211,77,0.32)" stroke-width="0.8"/>
    <g transform="translate(108,52)">
      <circle cx="0" cy="0" r="5" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="40" y2="-18" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="40" y2="0"   stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="40" y2="18"  stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="46" cy="-18" r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="46" cy="0"   r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <circle cx="46" cy="18"  r="4" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
      <line x1="50" y1="-18" x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="50" y1="0"   x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <line x1="50" y1="18"  x2="86" y2="0" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="92" cy="0" r="5" fill="rgba(196,181,253,0.30)" stroke="rgba(196,181,253,0.60)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">PARALLEL</text>
    <text x="160" y="120" text-anchor="middle" class="desc">fan-out + fan-in · race / vote</text>
  </g>
</svg>
