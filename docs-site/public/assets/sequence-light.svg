<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" role="img"
     aria-label="Sequence control flow — linear chain A → B → C → D shown as 4 violet Agent dots connected by yellow arrows.">
  <defs>
    <style>
      .pulse  { animation: cf-p 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes cf-p { 0%,100% { opacity: 1 } 50% { opacity: 0.65 } }
      .name { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 14px; letter-spacing: 0.18em; font-weight: 800; fill: #B45309; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; font-size: 11px; fill: #6B7280; }
    </style>
  </defs>
  <g class="pulse" transform="translate(20,0)">
    <rect width="320" height="140" rx="14" fill="rgba(180,83,9,0.05)" stroke="rgba(180,83,9,0.32)" stroke-width="0.8"/>
    <g transform="translate(76,52)">
      <circle cx="0" cy="0" r="6" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <line x1="6" y1="0" x2="32" y2="0" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <polygon points="30,-3 36,0 30,3" fill="#B45309"/>
      <circle cx="44" cy="0" r="6" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <line x1="50" y1="0" x2="76" y2="0" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <polygon points="74,-3 80,0 74,3" fill="#B45309"/>
      <circle cx="88" cy="0" r="6" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
      <line x1="94" y1="0" x2="120" y2="0" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
      <polygon points="118,-3 124,0 118,3" fill="#B45309"/>
      <circle cx="132" cy="0" r="6" fill="rgba(124,58,237,0.20)" stroke="rgba(124,58,237,0.55)" stroke-width="0.8"/>
    </g>
    <text x="160" y="100" text-anchor="middle" class="name">SEQUENCE</text>
    <text x="160" y="120" text-anchor="middle" class="desc">linear chain · A → B → C</text>
  </g>
</svg>
