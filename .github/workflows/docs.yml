name: Deploy Docs

# Builds the docs-next site (homepage + Fumadocs docs) as a static export and deploys
# it to GitHub Pages at https://footprintjs.github.io/agentfootprint/.
on:
  push:
    branches: [main]
    paths:
      - 'docs-next/**'
      - 'src/**' # API reference is generated from source
      - 'scripts/gen-fumadocs-api.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # The library itself: docs-next's twoslash code-checks and the generated API
      # reference both resolve against agentfootprint's built types (dist/), so build it.
      - name: Install library deps
        run: npm install
      - name: Build library (dist types for twoslash + API gen)
        run: npm run build

      - name: Install docs-next deps
        working-directory: docs-next
        run: npm install

      # Static export with the GitHub-Pages project base path. EXPORT=true flips
      # next.config to output:'export'; NEXT_PUBLIC_BASE_PATH feeds both the router
      # basePath and lib/site.ts asset() so every URL is correctly prefixed.
      - name: Build static export
        working-directory: docs-next
        env:
          EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: '/agentfootprint'
        run: npm run build

      # GitHub Pages must not run Jekyll (it would drop the _next/ underscore dir).
      - name: Disable Jekyll
        run: touch docs-next/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-next/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
