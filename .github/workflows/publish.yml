name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # no cache — lockfile not committed (platform-specific native deps)
          registry-url: https://registry.npmjs.org

      - run: npm install
      # Build BEFORE test. Examples in test/examples-smoke.test.ts import
      # from the package name 'agentfootprint', resolved via the local
      # package's main/exports → dist/. Without an upstream build those
      # imports fail. (Same fix as in ci.yml.)
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
