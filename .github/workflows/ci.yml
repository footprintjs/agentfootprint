name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          # no cache — lockfile not committed (platform-specific native deps)

      - run: npm install
      - run: npx tsc --noEmit
      # Build BEFORE test. Examples in test/examples-smoke.test.ts import
      # from the package name 'agentfootprint' (not relative paths), and
      # Node's resolver looks up the local package's main/exports which
      # point to dist/. Without an upstream build, those imports fail
      # with "Failed to resolve entry for package 'agentfootprint'".
      - run: npm run build
      - run: npm test
      # Packaging-correctness gate: dual CJS/ESM types resolve in every consumer mode.
      - run: npx publint
      - run: npx @arethetypeswrong/cli --pack

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # no cache — lockfile not committed (platform-specific native deps)

      - run: npm install
      - run: npm run lint
      - run: npm run format

  # Docs gate: builds docs-next (Fumadocs), which twoslash-compiles every
  # "ts twoslash" code block against the real agentfootprint types at build.
  # A snippet using a renamed/removed API fails the build -> hand-written doc
  # code can't drift from the library (the test job proves examples/ run).
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root deps (docs-next resolves agentfootprint via a local dep)
        run: npm install

      - name: Install docs-next deps
        working-directory: docs-next
        run: npm install

      - name: Build docs-next (twoslash-gates every code block)
        working-directory: docs-next
        run: npm run build

  # Doc-links gate — every internal cross-reference in docs-next must resolve.
  # Hand-written guides link by stable id (doc:<id>, resolved at build by
  # lib/remark-doc-links.mjs); this re-derives the id->route index from the
  # filesystem and fails on any dead id or stale #anchor. A page moved between
  # taxonomy folders, or a reworded heading, can therefore never ship a broken
  # link. Self-contained: github-slugger is the script's only external dep.
  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install --no-save github-slugger
      - run: node scripts/check-doc-links.mjs --strict

  # Coverage gate — runs vitest with v8 coverage; uploads lcov to Codecov.
  # No threshold enforcement (per design memo); badge surfaces the number
  # so it stays visible without becoming a hostage to chasing the metric.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install
      - run: npm run build
      - run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
