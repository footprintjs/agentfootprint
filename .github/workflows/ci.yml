name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # no cache — lockfile not committed (platform-specific native deps)

      - run: npm install
      - run: npx tsc --noEmit
      # Build BEFORE test. Examples in test/examples-smoke.test.ts import
      # from the package name 'agentfootprint' (not relative paths), and
      # Node's resolver looks up the local package's main/exports which
      # point to dist/. Without an upstream build, those imports fail
      # with "Failed to resolve entry for package 'agentfootprint'".
      - run: npm run build
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # no cache — lockfile not committed (platform-specific native deps)

      - run: npm install
      - run: npm run lint
      - run: npm run format
